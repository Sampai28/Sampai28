name: Update Skills in README

on:
  schedule:
    - cron: "0 2 * * *"  # Runs every night at 2am UTC
  push:
    branches: ["main"]    # Also triggers on direct push to profile repo
  workflow_dispatch:      # Also allows manual trigger

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run skill scanner
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: Sampai28
        run: python .github/scripts/update_skills.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || (git add README.md && git commit -m "🤖 Auto-update skills from repos" && git push)
